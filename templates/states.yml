# Career-Ops — Canonical States

states:
  - id: qualified
    label: Qualified
    aliases: [calificado, evaluada, evaluated]
    description: Opportunity scored and worth keeping in view
    dashboard_group: qualified

  - id: reached_out
    label: Reached Out
    aliases: [contactado, respondido, responded]
    description: Outbound or follow-up contact sent
    dashboard_group: reached_out

  - id: submitted
    label: Submitted
    aliases: [aplicado, applied, proposal sent, enviada, aplicada]
    description: Application, proposal, or capability package submitted
    dashboard_group: submitted

  - id: in_process
    label: In Process
    aliases: [entrevista, interview, discovery, interview process]
    description: Discovery, interviews, or active evaluation is underway
    dashboard_group: in_process

  - id: negotiating
    label: Negotiating
    aliases: [negociando, offer, oferta]
    description: Terms, scope, or compensation are being negotiated
    dashboard_group: negotiating

  - id: won
    label: Won
    aliases: [ganado, closed won, signed]
    description: Role accepted or project signed
    dashboard_group: won

  - id: lost
    label: Lost
    aliases: [perdido, rejected, rechazado, rechazada]
    description: Opportunity lost or rejected
    dashboard_group: lost

  - id: parked
    label: Parked
    aliases: [aparcado, descartado, descartada, no aplicar, skip, monitor, hold]
    description: Not worth pursuing now
    dashboard_group: parked
