# Portal Scanner Configuration
# Defaults for a Drupal developer pursuing both full-time and freelance work.

title_filter:
  positive:
    - "Drupal"
    - "PHP"
    - "Symfony"
    - "Acquia"
    - "CMS"
    - "Headless"
    - "Decoupled"
    - "Migration"
    - "Technical Lead"
    - "Tech Lead"
    - "Solutions Architect"
    - "Full Stack"
    - "Backend"
    - "Web Platform"
    - "Freelance"
    - "Contract"
    - "Contractor"
    - "Consultant"
    - "Accessibility"
    - "Gov"
    - "Government"
    - "Higher Education"
  negative:
    - "WordPress-only"
    - "Shopify"
    - "Magento"
    - "Salesforce"
    - "iOS"
    - "Android"
    - "Junior"
    - "Intern"
  seniority_boost:
    - "Senior"
    - "Lead"
    - "Principal"
    - "Staff"
    - "Architect"

search_queries:
  - name: LinkedIn — Drupal full-time
    query: 'site:linkedin.com/jobs/view ("Drupal Developer" OR "Lead Drupal Engineer" OR "Drupal Architect") remote'
    enabled: true

  - name: LinkedIn — Drupal contract
    query: 'site:linkedin.com/jobs/view ("Drupal" AND ("contract" OR "contractor" OR "freelance")) remote'
    enabled: true

  - name: Upwork — Drupal
    query: 'site:upwork.com/freelance-jobs/ Drupal PHP Acquia migration'
    enabled: true

  - name: Malt — Drupal
    query: 'site:malt.com "Drupal" freelance project'
    enabled: true

  - name: Worksome — Drupal contract
    query: 'site:worksome.com Drupal contract remote'
    enabled: true

  - name: General — Drupal lead roles
    query: '"Drupal Technical Lead" OR "Drupal Solutions Architect" remote'
    enabled: true

  - name: General — headless Drupal
    query: '"Headless Drupal" OR "Decoupled Drupal" remote'
    enabled: true

tracked_companies:
  - name: Acquia
    careers_url: https://www.acquia.com/careers
    scan_method: websearch
    scan_query: 'site:acquia.com/careers Drupal OR Acquia'
    enabled: true

  - name: Platform.sh
    careers_url: https://platform.sh/company/careers/
    scan_method: websearch
    scan_query: 'site:platform.sh/company/careers Drupal OR PHP'
    enabled: true

  - name: Lullabot
    careers_url: https://www.lullabot.com
    scan_method: websearch
    scan_query: 'site:lullabot.com Drupal jobs OR careers'
    enabled: true

  - name: amazee.io
    careers_url: https://www.amazee.io
    scan_method: websearch
    scan_query: 'site:amazee.io Drupal careers OR jobs'
    enabled: true

  - name: PreviousNext
    careers_url: https://www.previousnext.com.au
    scan_method: websearch
    scan_query: 'site:previousnext.com.au Drupal careers OR jobs'
    enabled: true

  - name: Four Kitchens
    careers_url: https://www.fourkitchens.com
    scan_method: websearch
    scan_query: 'site:fourkitchens.com Drupal jobs OR careers'
    enabled: true

  - name: Tag1 Consulting
    careers_url: https://www.tag1consulting.com
    scan_method: websearch
    scan_query: 'site:tag1consulting.com Drupal jobs OR careers'
    enabled: true

  - name: Palantir.net
    careers_url: https://www.palantir.net
    scan_method: websearch
    scan_query: 'site:palantir.net Drupal careers OR jobs'
    enabled: true
